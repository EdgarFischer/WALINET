run:
  name: "3T_36x36_Unet_1.2"
  seed: 42
  gpu: 3

data:
  base_dir: "../data/3T"
  train_subjects: ['Vol01_WB/Res36x36', 'Vol02_BS/Res36x36', 'Vol03_SH/Res36x36', 'Vol04_SM/Res36x36', 'Vol05_LH/Res36x36']

  val_subjects: ['Vol01_WB/Res36x36']

  version: "v_1.2"
  train_data_filename: "TrainData_{version}.h5"
  normalization: "max_abs" # projection_energy is pauls style, max_abs does not need the lipid projection operator

output:
  base_dir: "../models"
  overwrite: false

training:
  enabled: true
  batch_size: 3800
  num_workers: 0
  epochs: 500
  n_batches: -1 # use all training batches
  n_val_batches: -1 # use all validation batches
  verbose: false

optim:
  lr: 0.00025

scheduler:
  milestones: [150, 300, 500]
  gamma: 0.25

model:
  architecture: "unet"   # "ynet" or "unet"
  n_layers: 3
  n_filters: 16
  in_channels: 2
  out_channels: 2
  dropout: 0.0

checkpoint:
  preload: false
  preload_model: ""

prediction:
  enabled: false